<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Switches e Patch Panels</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Mapa de Switches e Patch Panels</h1>

  <div id="switches-container">
    <h2>Switches</h2>
    <div id="switches"></div>
  </div>

  <div id="patches-container">
    <h2>Patch Panels</h2>
    <div id="patches"></div>
  </div>

  <p id="info">Clique em uma porta</p>

  <svg id="svgLines"></svg>

  <div id="form-container">
  <h2>Adicionar Mapeamento</h2>
  <form id="mappingForm">
    <label>Switch:</label>
    <select name="switch" required>
      <option value="switch1">Switch 1</option>
      <option value="switch2">Switch 2</option>
      <option value="switch3">Switch 3</option>
      <option value="switch4">Switch 4</option>
    </select><br><br>

    <label>Porta do Switch:</label>
    <input type="number" name="switchPort" min="1" max="26" required><br><br>

    <label>Patch Panel:</label>
    <select name="patchPanel" required>
      <option value="PatchPanel1">Patch Panel 1</option>
      <option value="PatchPanel2">Patch Panel 2</option>
      <option value="PatchPanel3">Patch Panel 3</option>
    </select><br><br>

    <label>Porta do Patch Panel:</label>
    <input type="number" name="patchPort" min="1" max="48" required><br><br>

    <label>VLAN:</label>
    <input type="number" name="vlan" min="1" max="4094" required><br><br>

    <button type="submit">Adicionar Mapeamento</button>
  </form>
</div>

  <script src="script.js"></script>
</body>
</html>
