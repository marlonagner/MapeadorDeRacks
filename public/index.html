<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Switches e Patch Panels</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Mapa de Switches e Patch Panels</h1>

  <div id="rack-container">
    <!-- Canvas atrás das portas -->
    <canvas id="canvasLines"></canvas>

    <div id="switches-container">
      <h2>Switches</h2>
      <div id="switches"></div>
    </div>

    <div id="patches-container">
      <h2>Patch Panels</h2>
      <div id="patches"></div>
    </div>
  </div>

  <p id="info">Clique em uma porta</p>

  <!-- Formulário -->
  <div id="form-container">
    <h2>Adicionar/Atualizar Mapeamento</h2>
    <form id="mappingForm">
      <label for="switchSelect">Switch:</label>
      <select id="switchSelect" required></select>

      <label for="switchPort">Porta do Switch:</label>
      <select id="switchPort" required></select>

      <label for="patchSelect">Patch Panel:</label>
      <select id="patchSelect" required></select>

      <label for="patchPort">Porta do Patch Panel:</label>
      <select id="patchPort" required></select>

      <label for="vlan">VLAN:</label>
      <input type="number" id="vlan" required min="1">

      <button type="submit">Salvar Mapeamento</button>
    </form>

    <h3>Import / Export JSON</h3>
    <button id="exportBtn">Exportar JSON</button>
    <input type="file" id="importFile" accept=".json">

    <button id="manualBackupBtn">Backup Manual</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
